<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ticker Stock - José Méndez</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* Contenedor principal ultra-pequeño */
        #ticker-container {
            height: 40px;
            background: #111;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #333;
            overflow: hidden;
            white-space: nowrap;
        }

        #ticker-content {
            display: inline-block;
            padding-left: 100%;
            animation: move 30s linear infinite;
            font-size: 1.2rem;
            font-weight: bold;
        }

        @keyframes move {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        .up { color: #00ff00; }
        .down { color: #ff4444; }

        /* Panel que se oculta solo */
        #panel {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(40,40,40,0.9);
            padding: 10px;
            display: flex;
            justify-content: space-between;
            transition: 0.5s;
            z-index: 10;
        }

        .oculto { transform: translateY(100%); opacity: 0; }
        
        input { background: #222; color: #0f0; border: 1px solid #444; padding: 5px; }
        .autor { font-size: 0.7rem; color: #888; text-align: right; }
    </style>
</head>
<body>

    <div id="ticker-container">
        <div id="ticker-content">Iniciando sistema de bolsa...</div>
    </div>

    <div id="panel">
        <div>
            <input type="text" id="stocks" value="AAPL,TSLA,MSFT,NVDA">
            <button onclick="getData()">Cargar</button>
        </div>
        <div class="autor">Autor: José Méndez</div>
    </div>

    <script>
        const API_KEY = '43453d9cd558518711f937072c3a3998';

        async function getData() {
            const symbols = document.getElementById('stocks').value;
            const content = document.getElementById('ticker-content');
            
            try {
                // Forzamos el uso de EOD que es más estable
                const resp = await fetch(`https://api.marketstack.com/v1/eod/latest?access_key=${API_KEY}&symbols=${symbols}`);
                const json = await resp.json();

                if (json.data && json.data.length > 0) {
                    content.innerHTML = '';
                    json.data.forEach(s => {
                        const dif = (s.close - s.open).toFixed(2);
                        const clase = dif >= 0 ? 'up' : 'down';
                        const flecha = dif >= 0 ? '▲' : '▼';
                        
                        content.innerHTML += `
                            <span style="margin-right:50px">
                                ${s.symbol}: <span class="${clase}">$${s.close.toFixed(2)} ${flecha} ${dif}</span>
                            </span>`;
                    });
                } else {
                    content.innerText = "Error: Verifica los símbolos o la API Key.";
                }
            } catch (e) {
                content.innerText = "Error de conexión con Marketstack.";
            }
        }

        // Control del panel auto-ocultable
        let timer;
        function mostrar() {
            document.getElementById('panel').classList.remove('oculto');
            clearTimeout(timer);
            timer = setTimeout(() => {
                document.getElementById('panel').classList.add('oculto');
            }, 5000);
        }

        document.addEventListener('mousemove', mostrar);
        document.addEventListener('touchstart', mostrar);

        getData(); // Carga inicial
        mostrar(); // Mostrar panel al inicio
    </script>
</body>
</html>
